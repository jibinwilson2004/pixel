<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <link rel="icon" type="image/png" href="fav.png" />
  <meta http-equiv="refresh" content="3;url=/index.html">
  <title>404 · social life not found</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      image-rendering: pixelated;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f1ea; /* soft cream base */
      font-family: 'Press Start 2P', monospace;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    /* subtle background pixel sparkles + soft geometric shapes */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(255, 182, 210, 0.08) 0px, transparent 30px),
        radial-gradient(circle at 90% 70%, rgba(59, 128, 214, 0.06) 0px, transparent 40px),
        radial-gradient(circle at 40% 90%, rgba(204, 255, 159, 0.07) 0px, transparent 50px);
      pointer-events: none;
      z-index: 0;
    }
    .stage {
      width: 100%;
      max-width: 980px;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 40px;
      /* 8‑point spacing system */
      gap: 24px;
    }
    /* ----- HEADER (title + sublabel) ----- */
    .title-block {
      text-align: center;
      width: 100%;
      max-width: 760px;
      margin-bottom: 8px;
      position: relative;
    }
    .title-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .title {
      font-size: clamp(44px, 9vw, 84px);
      letter-spacing: 0.04em;
      color: #ff4f88;
      text-transform: uppercase;
      text-shadow: 6px 6px 0 rgba(59, 128, 214, 0.12), -4px -4px 0 rgba(255, 182, 210, 0.10);
      margin: 2px 0;
      animation: glitch 2.8s infinite steps(1);
    }
    @keyframes glitch {
      0%, 90%, 100% { transform: skew(0deg); opacity: 1; }
      92% { transform: skew(2deg) translateX(2px); opacity: 0.9; }
      94% { transform: skew(-2deg) translateX(-2px); opacity: 1; }
      96% { transform: skew(1deg) translateX(1px); opacity: 0.95; }
    }
    .sublabel {
      display: inline-block;
      border: 4px solid #222;
      padding: 12px 28px;
      background: #ffffffcc;
      backdrop-filter: blur(2px);
      margin: 24px 0 8px;
      font-size: clamp(11px, 1.3vw, 15px);
      border-radius: 4px;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
    }
    .sublabel .inner {
      display: inline-block;
      letter-spacing: 0.5px;
    }

    /* ----- POPUP CARD (main focus) ----- */
    .card {
      width: min(640px, 100%);
      margin: 8px auto 0;
      border: 6px solid #f0c7d3;
      background: linear-gradient(145deg, #fff0f4, #ffe2ea);
      box-shadow: 18px 20px 0 rgba(255, 160, 190, 0.5), 0 12px 30px rgba(0,0,0,0.08);
      border-radius: 6px;
      animation: floatIn 0.7s cubic-bezier(0.23, 1, 0.32, 1);
      transition: box-shadow 0.2s;
      position: relative;
    }
    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(40px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card:hover {
      box-shadow: 20px 22px 0 rgba(255, 160, 190, 0.5), 0 16px 40px rgba(0,0,0,0.08);
    }
    .titlebar {
      height: 50px;
      background: #3b80d6;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      font-size: clamp(14px, 1.2vw, 17px);
      letter-spacing: 0.3px;
      border-bottom: 4px solid #2a5f9e;
    }
    .titlebar .x {
      width: 38px;
      height: 38px;
      border: 3px solid #111;
      background: #fff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }
    .card-body {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      padding: 32px 32px 24px;
      gap: 28px 24px;
    }
    .circle-x {
      width: clamp(80px, 11vw, 100px);
      height: clamp(80px, 11vw, 100px);
      border-radius: 999px;
      background: #ff7aa1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 8px solid #f8c7d3;
      box-shadow: inset -6px -6px 0 rgba(0,0,0,0.06);
      flex-shrink: 0;
    }
    .circle-x::before {
      content: '\00D7';
      font-size: clamp(34px, 5vw, 50px);
      color: #fff;
      font-weight: 400;
    }
    .msg-block {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .msg {
      font-family: 'Courier New', monospace;
      font-size: clamp(14px, 1.2vw, 18px);
      line-height: 1.8;
      color: #1a1a1a;
      max-width: 340px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    /* ----- LARGER "RETURN HOME" BUTTON (pixel style) ----- */
    .btn-home {
      margin: 20px 0 6px;
      padding: 14px 28px;
      min-width: 200px;
      border: 5px solid #111;
      background: #ffb6d2;
      color: #111;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.08s linear;
      box-shadow: 6px 6px 0 #111;
      position: relative;
      animation: bounceBtn 3s infinite ease-in-out;
      image-rendering: pixelated;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .btn-home:hover {
      transform: translate(2px, 2px);
      box-shadow: 4px 4px 0 #111;
      background: #ffa5c8;
    }
    .btn-home:active {
      transform: translate(6px, 6px);
      box-shadow: 0px 0px 0 #111;
      background: #ff8fb5;
      transition: 0.02s;
    }
    @keyframes bounceBtn {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ----- DECORATIVE ICONS (symmetrical, pixel) ----- */
    .deco-group {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }
    .deco-group svg {
      display: block;
      width: clamp(40px, 5.5vw, 68px);
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.06));
    }
    /* positions using 8‑point rhythm */
    .deco-folder { left: 3%; top: 12%; }
    .deco-heart { right: 3%; top: 12%; animation: heartBeat 1.8s infinite; }
    .deco-trash { left: 5%; bottom: 8%; }
    .deco-sparkle { right: 5%; bottom: 8%; }
    .deco-star-sm { left: 16%; top: 4%; }
    .deco-star-md { right: 16%; top: 4%; }
    .deco-star-sm2 { left: 22%; bottom: 3%; }
    .deco-star-md2 { right: 22%; bottom: 3%; }

    /* small & medium stars */
    .deco-star-sm svg { width: clamp(22px, 2.8vw, 34px); }
    .deco-star-md svg { width: clamp(30px, 4vw, 48px); }
    .deco-star-sm2 svg { width: clamp(22px, 2.8vw, 34px); }
    .deco-star-md2 svg { width: clamp(30px, 4vw, 48px); }

    /* animations */
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.15); }
      30% { transform: scale(0.95); }
      45% { transform: scale(1.1); }
      60% { transform: scale(1); }
    }
    .blink-folder {
      animation: blinkFolder 2.4s step-start infinite;
    }
    @keyframes blinkFolder {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.2; }
    }
    .float-star {
      animation: floatStar 3.2s infinite alternate ease-in-out;
    }
    @keyframes floatStar {
      0% { transform: translateY(0px) rotate(0deg); }
      100% { transform: translateY(-12px) rotate(8deg); }
    }
    .cursor-trail {
      position: absolute;
      width: 16px;
      height: 16px;
      background: radial-gradient(circle, #ffb6d2 20%, transparent 80%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.6;
      animation: sparkleTrail 1.4s infinite alternate;
    }
    @keyframes sparkleTrail {
      0% { transform: scale(0.6); opacity: 0.2; }
      100% { transform: scale(1.4); opacity: 0.7; }
    }

    /* responsive: adjust positions & sizes */
    @media (max-width: 820px) {
      .deco-folder { left: 2%; top: 10%; }
      .deco-heart { right: 2%; top: 10%; }
      .deco-trash { left: 3%; bottom: 6%; }
      .deco-sparkle { right: 3%; bottom: 6%; }
      .deco-star-sm { left: 12%; top: 3%; }
      .deco-star-md { right: 12%; top: 3%; }
      .deco-star-sm2 { left: 18%; bottom: 2%; }
      .deco-star-md2 { right: 18%; bottom: 2%; }
    }
    @media (max-width: 600px) {
      .card-body { flex-direction: column; padding: 24px 16px 16px; gap: 16px; }
      .titlebar { justify-content: center; gap: 12px; }
      .btn-home { min-width: 160px; padding: 12px 18px; font-size: 11px; }
      .deco-folder, .deco-heart, .deco-trash, .deco-sparkle { display: none; }
      .deco-star-sm { left: 6%; top: 2%; }
      .deco-star-md { right: 6%; top: 2%; }
      .deco-star-sm2 { left: 10%; bottom: 2%; }
      .deco-star-md2 { right: 10%; bottom: 2%; }
      .deco-star-sm svg { width: 24px; }
      .deco-star-md svg { width: 32px; }
      .deco-star-sm2 svg { width: 24px; }
      .deco-star-md2 svg { width: 32px; }
    }
    @media (max-width: 420px) {
      .title { font-size: 30px; }
      .sublabel { padding: 8px 14px; font-size: 9px; }
      .btn-home { min-width: 130px; padding: 10px 12px; font-size: 9px; }
    }
  </style>
</head>
<body>
<div class="stage">

  <!-- HEADER -->
  <div class="title-block">
    <div class="title-row">
      <div class="title">Webpage</div>
      <div class="title">under</div>
      <div class="title">construction</div>
    </div>
    <div class="sublabel"><span class="inner">SOCIAL LIFE NOT FOUND ☹️</span></div>
  </div>

  <!-- POPUP CARD -->
  <div class="card">
    <div class="titlebar">
      <span>⚠ System Error</span>
      <div class="x">✖</div>
    </div>
    <div class="card-body">
      <div class="circle-x"></div>
      <div class="msg-block">
        <div class="msg">
          The page you're looking<br>
          for might have been<br>
          removed, or never existed.
        </div>
        <a href="/index.html" class="btn-home">↺ Return Home</a>
      </div>
    </div>
    <!-- cursor sparkle trail (decorative) -->
    <div class="cursor-trail" style="bottom: 12px; right: 20px;"></div>
  </div>

  <!-- ===== DECORATIVE PIXEL ICONS (symmetrical) ===== -->

  <!-- folder (left top) blink -->
  <div class="deco-group deco-folder blink-folder">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="6" y="18" width="52" height="34" fill="#cfffbb" stroke="#111" stroke-width="2"/>
      <rect x="6" y="8" width="24" height="14" fill="#cfffbb" stroke="#111" stroke-width="2"/>
      <path d="M42 14v6" stroke="#111" stroke-width="2"/>
      <rect x="44" y="10" width="10" height="6" fill="#ff9ab8" stroke="#111" stroke-width="2"/>
    </svg>
  </div>

  <!-- heart (right top) beating -->
  <div class="deco-group deco-heart">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <path d="M32 52 C10 34 10 20 24 14 C32 10 36 18 36 18 C36 18 40 10 48 14 C62 20 62 34 40 52 Z" fill="#ff5aa5" stroke="#111" stroke-width="2"/>
    </svg>
  </div>

  <!-- trash (left bottom) -->
  <div class="deco-group deco-trash">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="18" y="20" width="28" height="28" fill="#ff9ab8" stroke="#111" stroke-width="2"/>
      <rect x="12" y="12" width="40" height="8" fill="#ff9ab8" stroke="#111" stroke-width="2"/>
    </svg>
  </div>

  <!-- sparkle (right bottom) -->
  <div class="deco-group deco-sparkle float-star">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="28" y="6" width="8" height="20" fill="#ccff9f" stroke="#111" stroke-width="2"/>
      <rect x="28" y="38" width="8" height="20" fill="#ccff9f" stroke="#111" stroke-width="2"/>
      <rect x="6" y="28" width="20" height="8" fill="#ccff9f" stroke="#111" stroke-width="2"/>
      <rect x="38" y="28" width="20" height="8" fill="#ccff9f" stroke="#111" stroke-width="2"/>
    </svg>
  </div>

  <!-- small stars (edges) -->
  <div class="deco-group deco-star-sm float-star">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="10" y="2" width="4" height="20" fill="#ffd" stroke="#111" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="deco-group deco-star-md float-star" style="animation-delay: 0.6s;">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="14" y="2" width="4" height="28" fill="#ffd" stroke="#111" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="deco-group deco-star-sm2 float-star" style="animation-delay: 1.2s;">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="10" y="2" width="4" height="20" fill="#ccff9f" stroke="#111" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="deco-group deco-star-md2 float-star" style="animation-delay: 0.3s;">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <rect x="14" y="2" width="4" height="28" fill="#ccff9f" stroke="#111" stroke-width="1.5"/>
    </svg>
  </div>

  <!-- extra tiny sparkle cursor (fake) -->
  <div style="position:absolute; right:8%; bottom:20%; width:12px; height:12px; background:#ffb6d2; border:2px solid #111; transform:rotate(45deg); opacity:0.4; pointer-events:none;"></div>

</div>
</body>
</html>
